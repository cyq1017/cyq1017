# BLIP2 Product Category Recognition - V1 Configuration

model:
  name: "Salesforce/blip2-opt-2.7b"
  dtype: "float16"
  device: "cuda"

data:
  num_products_per_leaf: 40
  anchor_ratio: 0.7          # 70% as anchor, 30% as test
  image_size: 224
  categories_file: "data/categories.json"
  products_file: "data/products.csv"
  anchor_file: "data/anchor_products.csv"
  test_file: "data/test_products.csv"
  image_dir: "data/images"

offline:
  embedding_dir: "embeddings"
  index_dir: "indices"
  batch_size: 32
  category_text_template: "{l1}/{l2}/{leaf}"
  category_keywords_enabled: true

online:
  recall:
    top_n: 50                # Top N anchor products to recall
    text_weight: 0.4         # Weight for text similarity in multimodal
    image_weight: 0.6        # Weight for image similarity in multimodal
  ranking:
    top_n: 10                # Top N leaf categories after ranking
  rerank:
    recall_weight: 0.45      # Weight for recall score in fusion
    rank_weight: 0.55        # Weight for ranking score in fusion

evaluation:
  top_k: [1, 3, 5]
  output_dir: "results"
  save_confusion_matrix: true
  save_classification_report: true
