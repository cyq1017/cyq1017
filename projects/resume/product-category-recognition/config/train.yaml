# config/train.yaml — V2 LoRA training hyperparameters
training:
  epochs: 3
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler: cosine
  fp16: true
  gradient_accumulation_steps: 2

lora:
  rank: 8
  alpha: 16
  dropout: 0.1

data:
  top_n_categories: 500
  max_products: 20000
  train_ratio: 0.7
  image_size: 224

checkpointing:
  save_dir: checkpoints
  save_every_epoch: true
