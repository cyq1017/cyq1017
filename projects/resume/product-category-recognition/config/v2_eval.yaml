# V2 evaluation config — uses V2 subset data
model:
  name: "Salesforce/blip2-opt-2.7b"
  dtype: "float16"
  device: "cuda"

data:
  num_products_per_leaf: 40
  anchor_ratio: 0.7
  image_size: 224
  categories_file: "data/category_descriptions.json"
  products_file: "data/v2_train.csv"
  anchor_file: "data/v2_train.csv"
  test_file: "data/v2_test.csv"
  image_dir: "/root/autodl-tmp/products-10k/train/train"

offline:
  embedding_dir: "embeddings_v2"
  index_dir: "indices_v2"
  batch_size: 32
  category_text_template: "{l1}/{l2}/{leaf}"
  category_keywords_enabled: true

online:
  recall:
    top_n: 50
    text_weight: 0.4
    image_weight: 0.6
  ranking:
    top_n: 10
  rerank:
    recall_weight: 0.45
    rank_weight: 0.55

evaluation:
  top_k: [1, 3, 5]
  output_dir: "results_v2"
  save_confusion_matrix: true
  save_classification_report: true
